<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: deep dark like the app -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1410"/>
      <stop offset="100%" style="stop-color:#0f0c09"/>
    </linearGradient>
    <!-- Brand gradient: orange-red like YouTube but Carsai -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#e63946"/>
    </linearGradient>
    <!-- Gear gradient -->
    <linearGradient id="gear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd166"/>
      <stop offset="100%" style="stop-color:#f4a261"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="2" y="2" width="508" height="508" rx="95" ry="95"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- YouTube-style play button shape (rounded rect) - brand colored -->
  <rect x="80" y="148" width="352" height="216" rx="36" ry="36"
        fill="url(#brand)" filter="url(#shadow)"/>

  <!-- Letter C cutout / overlay - white, bold -->
  <text x="192" y="302"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="148" font-weight="900" fill="white"
        text-anchor="middle" filter="url(#glow)">C</text>

  <!-- Gear icon - top right of the play button -->
  <g transform="translate(338, 148)" filter="url(#shadow)">
    <!-- Gear body -->
    <circle cx="42" cy="42" r="18" fill="url(#gear)"/>
    <circle cx="42" cy="42" r="9" fill="#1a1410"/>
    <!-- Gear teeth (8 teeth) -->
    <g fill="url(#gear)">
      <rect x="38" y="16" width="8" height="14" rx="3"/>
      <rect x="38" y="54" width="8" height="14" rx="3"/>
      <rect x="16" y="38" width="14" height="8" rx="3"/>
      <rect x="54" y="38" width="14" height="8" rx="3"/>
      <rect x="22" y="22" width="8" height="14" rx="3" transform="rotate(45 26 29)"/>
      <rect x="54" y="22" width="8" height="14" rx="3" transform="rotate(-45 58 29)"/>
      <rect x="22" y="54" width="8" height="14" rx="3" transform="rotate(-45 26 61)"/>
      <rect x="54" y="54" width="8" height="14" rx="3" transform="rotate(45 58 61)"/>
    </g>
  </g>

  <!-- Small key icon - bottom left -->
  <g transform="translate(96, 300)" opacity="0.85">
    <circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="5"/>
    <rect x="30" y="17" width="34" height="6" rx="3" fill="rgba(255,255,255,0.6)"/>
    <rect x="52" y="23" width="6" height="10" rx="2" fill="rgba(255,255,255,0.6)"/>
    <rect x="43" y="23" width="6" height="8" rx="2" fill="rgba(255,255,255,0.6)"/>
  </g>
</svg>
