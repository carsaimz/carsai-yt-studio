name: iOS — IPA (unsigned)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  ios:
    name: Build iOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web (mobile)
        run: npm run build:mobile
        env:
          BUILD_TARGET: mobile
          NITRO_PRESET: node-server
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Setup Capacitor iOS
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios \
            @capacitor/push-notifications @capacitor/local-notifications \
            @capacitor/splash-screen @capacitor/status-bar \
            @capacitor/camera @capacitor/filesystem @capacitor/preferences
          [ -d ios ] || npx cap add ios
          npx cap sync ios

      # pod install MUST run after cap sync — Podfile is generated by cap sync
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Build archive (unsigned)
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release -sdk iphoneos \
            -archivePath build/App.xcarchive archive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        working-directory: ios/App/build
        run: |
          mkdir -p Payload
          cp -R App.xcarchive/Products/Applications/App.app Payload/
          zip -qr App-unsigned.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/App/build/App-unsigned.ipa

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ios/App/build/App-unsigned.ipa
