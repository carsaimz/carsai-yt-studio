name: Sync to carsai-yt-studio (public)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (pro)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Sync to public repo (without sync.yml)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Add destination remote
          git remote add destination \
            https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/carsaimz/carsai-yt-studio.git

          # Create orphan-style approach: clone current state, remove sync.yml, force push
          # Work in a temp directory to avoid branch confusion
          TMPDIR=$(mktemp -d)
          git worktree add "$TMPDIR/sync-branch" HEAD

          cd "$TMPDIR/sync-branch"

          # Remove the sync workflow file from the copy
          rm -f .github/workflows/sync.yml

          # Configure git identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage the removal and commit
          git add -A
          git commit -m "chore: sync from pro [skip ci]" || echo "Nothing to commit"

          # Push to destination
          git push destination HEAD:main --force
          echo "✅ Synced to carsaimz/carsai-yt-studio"

          # Cleanup
          cd "$GITHUB_WORKSPACE"
          git worktree remove "$TMPDIR/sync-branch" --force 2>/dev/null || true
          rm -rf "$TMPDIR"
