name: Android Build (APK + AAB)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Install Capacitor deps
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Add Android platform if missing
        run: |
          [ -d android ] || npx cap add android
          npx cap sync android

      - name: Decode keystore
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore/release.jks
          echo "✅ Keystore decodificado com sucesso"

      - name: Validate keystore
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          if [ ! -f "android/app/keystore/release.jks" ]; then
            echo "❌ Keystore file not found after decode"
            exit 1
          fi
          echo "✅ Keystore validated"

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "✅ Version set to: $VERSION"

      - name: Validate version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ -z "$VERSION" ]; then
            echo "❌ VERSION not set from tag"
            exit 1
          fi
          # Validate semver format (basic)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "⚠️  Version doesn't follow semver format: $VERSION"
          fi

      - name: Build signed APK + AAB
        if: secrets.KEYSTORE_BASE64 != ''
        working-directory: android
        shell: bash
        run: |
          echo "🔐 Building signed artifacts..."
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/keystore/release.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            -PversionName="${VERSION:-1.0.0}"
          echo "✅ Build signed completed"

      - name: Build unsigned APK + AAB
        if: secrets.KEYSTORE_BASE64 == ''
        working-directory: android
        shell: bash
        run: |
          echo "📦 Building unsigned artifacts..."
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon \
            -PversionName="${VERSION:-1.0.0}"
          echo "✅ Build unsigned completed"

      - name: Validate APK and AAB
        run: |
          echo "🔍 Validating build artifacts..."
          
          # Check APK
          APK_COUNT=$(find android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | wc -l)
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "❌ No APK found!"
            exit 1
          fi
          echo "✅ Found $APK_COUNT APK(s)"
          
          # Check AAB
          AAB_COUNT=$(find android/app/build/outputs/bundle/release -name "*.aab" 2>/dev/null | wc -l)
          if [ "$AAB_COUNT" -eq 0 ]; then
            echo "❌ No AAB found!"
            exit 1
          fi
          echo "✅ Found $AAB_COUNT AAB(s)"
          
          # Show file sizes
          echo "📊 Artifact sizes:"
          find android/app/build/outputs -name "*.apk" -o -name "*.aab" | while read file; do
            size=$(du -h "$file" | cut -f1)
            echo "  - $(basename "$file"): $size"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
          compression-level: 6

      - name: Generate CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "📝 Generating CHANGELOG..."
          
          # Create temp file with version header
          echo "### Versão $VERSION" > CHANGELOG_temp.md
          echo "" >> CHANGELOG_temp.md
          
          # Get commits since last tag
          PREV_TAG=$(git describe --abbrev=0 --tags HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "📋 No previous tag found, getting all commits..."
            git log --pretty=format:"- %s (%h)" >> CHANGELOG_temp.md
          else
            echo "📋 Changes since $PREV_TAG:"
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG_temp.md
          fi
          
          # Add blank line
          echo "" >> CHANGELOG_temp.md
          echo "" >> CHANGELOG_temp.md
          
          # Append existing CHANGELOG if it exists
          if [ -f CHANGELOG.md ]; then
            cat CHANGELOG.md >> CHANGELOG_temp.md
          fi
          
          # Replace with new version
          mv CHANGELOG_temp.md CHANGELOG.md
          echo "✅ CHANGELOG generated successfully"

      - name: Commit CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "📤 Committing CHANGELOG..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to CHANGELOG.md"
          else
            git commit -m "chore: update CHANGELOG.md for $VERSION"
            echo "✅ CHANGELOG committed locally"
            
            # Push with retry
            if git push origin HEAD:main; then
              echo "✅ CHANGELOG pushed to remote"
            else
              echo "⚠️ Failed to push CHANGELOG, but continuing..."
            fi
          fi

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const message = `❌ **Build failed!**
            - Workflow: ${context.workflow}
            - Run ID: ${context.runId}
            - Repository: ${context.repo.owner}/${context.repo.repo}
            - Commit: ${context.sha}
            
            Check logs: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            console.log(message);
            core.setFailed('Build failed! Check logs for details.');

      - name: Success message
        if: success()
        run: |
          echo "🎉 Build completed successfully!"
          echo "📦 Artifacts uploaded with retention of 30 days"
          if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
            echo "🏷️ Release created for version $VERSION"
          fi