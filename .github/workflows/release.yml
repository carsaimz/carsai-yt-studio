name: Release — Changelog

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag para gerar/actualizar release (ex: v1.0.1). Vazio = usa a tag mais recente."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve target tag
        id: ver
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
            # Normalise: allow "1.0.1" or "v1.0.1"
            case "$TAG" in
              v*) ;;
              *) TAG="v$TAG" ;;
            esac
            if ! git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "::error::Tag '$TAG' não existe neste repositório."
              exit 1
            fi
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            # No input and not triggered by a tag push → use the most recent tag
            TAG=$(git tag --sort=-v:refname | grep "^v" | head -n1)
            if [ -z "$TAG" ]; then
              echo "::error::Nenhuma tag encontrada no repositório. Crie uma tag primeiro (ex: git tag v0.1.0)."
              exit 1
            fi
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "🏷️ Release alvo: $TAG"

      - name: Generate changelog
        id: cl
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          PREV=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | grep "^v" | awk -v t="$TAG" '{ if ($0 < t) print }' | head -n1)
          DATE=$(date +'%d/%m/%Y %H:%M UTC')
          if [ -n "$PREV" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "${PREV}..${TAG}" 2>/dev/null || echo "- Initial release")
          else
            COMMITS=$(git log --pretty=format:"- %s" "${TAG}" -20 2>/dev/null || echo "- Initial release")
          fi
          {
            echo 'body<<EOF'
            echo "## 🚀 Carsai YT Studio ${TAG}"
            echo ""
            echo "**Data:** ${DATE}"
            [ -n "$PREV" ] && echo "**Desde:** \`${PREV}\`"
            echo ""
            echo "## 📝 Mudanças"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo ""
            echo "## 📦 Downloads"
            echo ""
            echo "| Plataforma | Arquivo |"
            echo "|---|---|"
            echo "| 🌐 Web | [Vercel](https://carsai-yt-studio.vercel.app) |"
            echo "| 📱 Android APK | Veja os assets abaixo |"
            echo "| 📱 Android AAB | Veja os assets abaixo (Play Store) |"
            echo "| 🖥️ Windows | Veja os assets abaixo |"
            echo "| 🖥️ macOS | Veja os assets abaixo |"
            echo "| 🖥️ Linux | Veja os assets abaixo |"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Carsai YT Studio ${{ steps.ver.outputs.tag }}"
          body: ${{ steps.cl.outputs.body }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
