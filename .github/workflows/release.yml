name: Release — Changelog & GitHub Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cl
        run: |
          PREV=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV" ]; then
            LOG=$(git log --pretty=format:'- %s (%h)' "$GITHUB_REF_NAME")
          else
            LOG=$(git log --pretty=format:'- %s (%h)' "$PREV..$GITHUB_REF_NAME")
          fi
          {
            echo 'body<<EOF'
            echo "## Changes"
            echo "$LOG"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Carsai YT Studio ${{ github.ref_name }}
          body: ${{ steps.cl.outputs.body }}
          generate_release_notes: true
