name: Release — Changelog & GitHub Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create / Update Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Get current version
        id: ver
        run: |
          V=$(node -p "require('./package.json').version")
          TAG="v${V}"
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "tag=$TAG"   >> $GITHUB_OUTPUT
          echo "📦 Version: $V → Tag: $TAG"

      - name: Generate changelog body
        id: changelog
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          V="${{ steps.ver.outputs.version }}"

          # Previous tag for this version (for incremental changelog)
          PREV_SAME=$(git tag -l "v${V}*" --sort=-v:refname | grep -v "^${TAG}$" | head -n1)
          # Any previous tag
          PREV_ANY=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n1)

          SINCE="${PREV_SAME:-${PREV_ANY}}"

          if [ -n "$SINCE" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%an)" "${SINCE}..HEAD" 2>/dev/null || echo "")
          else
            COMMITS=$(git log --pretty=format:"- %s (%an)" -20 2>/dev/null || echo "")
          fi

          DATE=$(date +'%d/%m/%Y %H:%M UTC')

          {
            echo 'body<<BODYEOF'
            echo "## 🚀 Carsai YT Studio v${V}"
            echo ""
            echo "**Data:** ${DATE}"
            [ -n "$SINCE" ] && echo "**Desde:** \`${SINCE}\`"
            echo ""
            echo "## 📝 Mudanças"
            echo ""
            if [ -n "$COMMITS" ]; then
              echo "$COMMITS"
            else
              echo "- Primeira release"
            fi
            echo ""
            echo "---"
            echo ""
            echo "## 📦 Downloads"
            echo ""
            echo "| Plataforma | Arquivo |"
            echo "|---|---|"
            echo "| 🌐 Web | [Deploy automático na Vercel](https://carsai-yt-studio.vercel.app) |"
            echo "| 📱 Android APK | Veja os assets abaixo |"
            echo "| 📱 Android AAB | Veja os assets abaixo |"
            echo "| 🖥️ Windows | Veja os assets abaixo |"
            echo "| 🖥️ macOS | Veja os assets abaixo |"
            echo "| 🖥️ Linux | Veja os assets abaixo |"
            echo 'BODYEOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Carsai YT Studio ${{ steps.ver.outputs.tag }}"
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
