name: Release — Changelog + Tag

# Item 6: além de gerar o release/changelog, este workflow também aceita uma
# versão manualmente. Quando fornecida, faz bump + commit + push da tag (e o
# resto da pipeline anexa os assets ao tag criado).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Versão para criar (ex: 1.2.0). Vazio = usa o último tag existente"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve version / tag
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          elif [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
            TAG="v${V#v}"
          else
            TAG=$(git tag --sort=-v:refname | grep '^v' | head -n1)
            [ -z "$TAG" ] && TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "tag=$TAG"            >> $GITHUB_OUTPUT
          echo "version=${TAG#v}"    >> $GITHUB_OUTPUT
          echo "📦 Tag alvo: $TAG"

      - name: Bump + sync (manual run with version)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          V="${{ steps.ver.outputs.version }}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='$V';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          node scripts/sync-version.mjs
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json capacitor.config.json android-template/app/build.gradle 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore(release): ${{ steps.ver.outputs.tag }} [skip ci]"
          git push || true
          TAG="${{ steps.ver.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -a "$TAG" -m "Carsai YT Studio $TAG"
            git push origin "$TAG"
          fi

      - name: Generate changelog
        id: cl
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          PREV=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | grep "^v" | head -n1)
          DATE=$(date +'%d/%m/%Y %H:%M UTC')
          if [ -n "$PREV" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "${PREV}..HEAD" 2>/dev/null || echo "- Initial release")
          else
            COMMITS=$(git log --pretty=format:"- %s" -20 2>/dev/null || echo "- Initial release")
          fi
          {
            echo 'body<<EOF'
            echo "## 🚀 Carsai YT Studio ${TAG}"
            echo ""
            echo "**Data:** ${DATE}"
            [ -n "$PREV" ] && echo "**Desde:** \`${PREV}\`"
            echo ""
            echo "## 📝 Mudanças"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo ""
            echo "## 📦 Downloads"
            echo ""
            echo "| Plataforma | Arquivo |"
            echo "|---|---|"
            echo "| 🌐 Web | [Vercel](https://carsai-yt-studio.vercel.app) |"
            echo "| 📱 Android APK | Veja os assets abaixo |"
            echo "| 📱 Android AAB | Veja os assets abaixo (Play Store) |"
            echo "| 🖥️ Windows | Veja os assets abaixo |"
            echo "| 🖥️ macOS | Veja os assets abaixo |"
            echo "| 🖥️ Linux | Veja os assets abaixo |"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Carsai YT Studio ${{ steps.ver.outputs.tag }}"
          body: ${{ steps.cl.outputs.body }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
