name: Android — APK + AAB

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor plugins
        run: |
          npm install \
            @capacitor/core @capacitor/cli @capacitor/android \
            @capacitor/push-notifications @capacitor/local-notifications \
            @capacitor/splash-screen @capacitor/status-bar \
            @capacitor/camera @capacitor/filesystem @capacitor/preferences \
            @capacitor/network @capacitor/device @capacitor/haptics

      - name: Build web (mobile)
        run: npm run build:mobile
        env:
          BUILD_TARGET: mobile
          NITRO_PRESET: node-server
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Init Capacitor Android
        run: |
          [ -d android ] || npx cap add android

      - name: Copy app icons to Android
        run: |
          RES="android/app/src/main/res"
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "$RES/mipmap-$density"
            cp "public/android-icons/mipmap-$density/ic_launcher.png" \
               "$RES/mipmap-$density/ic_launcher.png"
            cp "public/android-icons/mipmap-$density/ic_launcher.png" \
               "$RES/mipmap-$density/ic_launcher_round.png"
          done
          echo "✓ Icons copied"

      - name: Apply AndroidManifest and resources from template
        run: |
          MAIN="android/app/src/main"
          TMPL="android-template/app/src/main"

          # Manifest
          cp "$TMPL/AndroidManifest.xml" "$MAIN/AndroidManifest.xml"

          # Resource folders
          for dir in values xml; do
            mkdir -p "$MAIN/res/$dir"
            cp -r "$TMPL/res/$dir/." "$MAIN/res/$dir/"
          done

          echo "✓ Manifest and resources applied"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/carsai-release.jks
            echo "HAS_KEYSTORE=true" >> $GITHUB_ENV
          else
            echo "HAS_KEYSTORE=false" >> $GITHUB_ENV
            echo "⚠️  Sem keystore — build não assinada."
          fi

      - name: Build APK + AAB (signed)
        if: env.HAS_KEYSTORE == 'true'
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/carsai-release.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Build APK + AAB (unsigned)
        if: env.HAS_KEYSTORE == 'false'
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
