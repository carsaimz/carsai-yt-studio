name: Android Build (APK + AAB)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build

      - name: Add Capacitor + Android
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          [ -d android ] || npx cap add android
          npx cap sync android

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/carsai-release.jks

      - name: Build signed APK + AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/carsai-release.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Build unsigned APK + AAB (no keystore)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon
          echo "⚠️  Artefacto não assinado — adicione os secrets de keystore para assinar."

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
