name: Android — APK + AAB

on:
  push:
    branches: [main]
  release:
    types: [published, created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag opcional (ex: v1.2.3)"
        required: false
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web (mobile)
        run: npm run build:mobile
        env:
          BUILD_TARGET: mobile
          NITRO_PRESET: node-server
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Install Capacitor
        run: |
          npm install \
            @capacitor/core @capacitor/cli @capacitor/android \
            @capacitor/assets \
            @capacitor/push-notifications @capacitor/splash-screen \
            @capacitor/status-bar @capacitor/camera @capacitor/filesystem \
            @capacitor/preferences @capacitor/network @capacitor/device

      - name: Setup Capacitor Android
        run: |
          if [ -d "android" ] && [ ! -f "android/app/src/main/AndroidManifest.xml" ]; then
            rm -rf android
          fi
          [ -d android ] || npx cap add android
          npx cap sync android

      - name: Generate app icons and splash (via @capacitor/assets)
        run: |
          # @capacitor/assets reads icon.png + splash.png from resources/ folder
          mkdir -p resources
          cp public/icon-512.png resources/icon.png
          cp public/icon-512.png resources/icon-foreground.png
          # Create a simple dark background for adaptive icon
          convert public/icon-512.png -resize 512x512 \
            -background "#1a1410" -gravity center -extent 512x512 \
            resources/icon-background.png 2>/dev/null || cp public/icon-512.png resources/icon-background.png
          # Use icon as splash too
          convert public/icon-512.png -resize 512x512 \
            -background "#1a1410" -gravity center -extent 2732x2732 \
            resources/splash.png 2>/dev/null || cp public/icon-512.png resources/splash.png

          npx @capacitor/assets generate --android \
            --iconBackgroundColor "#1a1410" \
            --iconBackgroundColorDark "#1a1410" \
            --splashBackgroundColor "#1a1410" \
            --splashBackgroundColorDark "#1a1410" \
            || echo "⚠️ @capacitor/assets partial failure — continuing"

      - name: Apply AndroidManifest
        run: |
          python3 << 'PY'
          import re

          path = "android/app/src/main/AndroidManifest.xml"
          with open(path) as f:
              content = f.read()

          # Remove existing permissions
          content = re.sub(r'\s*<uses-permission[^/]*/>', '', content)

          perms = """
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>"""

          content = re.sub(r'(<manifest[^>]*>)', r'\1' + perms, content, count=1)

          with open(path, 'w') as f:
              f.write(content)

          print("✅ AndroidManifest patched")
          PY

      - name: Calculate version
        id: versioning
        run: |
          BASE=$(node -p "require('./package.json').version")
          LAST=$(git tag -l "v${BASE}*" --sort=-v:refname | head -n1)
          if [ -z "$LAST" ]; then BUILD=1
          elif [[ "$LAST" =~ build\.([0-9]+)$ ]]; then BUILD=$(( ${BASH_REMATCH[1]} + 1 ))
          else BUILD=1; fi
          NEW="v${BASE}-build.${BUILD}"
          echo "base=$BASE"  >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "📦 Version: $NEW (build #$BUILD)"

      - name: Update Android version in build.gradle
        run: |
          BUILD="${{ steps.versioning.outputs.build }}"
          BASE="${{ steps.versioning.outputs.base }}"
          sed -i "s/versionCode [0-9]*/versionCode ${BUILD}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${BASE}\"/" android/app/build.gradle
          echo "✅ versionCode=$BUILD versionName=$BASE"
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Setup keystore
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_FILE" ]; then
            printf '%s' "$KEYSTORE_FILE" | tr -d '[:space:]' | base64 -d > android/app/carsai.keystore
            keytool -list -keystore android/app/carsai.keystore \
              -storepass "$KEYSTORE_PASSWORD" -alias "$KEYSTORE_ALIAS" -noprompt \
              && echo "HAS_KEYSTORE=true" >> $GITHUB_ENV \
              || { echo "⚠️ Keystore inválido"; echo "HAS_KEYSTORE=false" >> $GITHUB_ENV; }
          else
            echo "HAS_KEYSTORE=false" >> $GITHUB_ENV
            echo "⚠️ Sem keystore — build não assinada"
          fi

      - name: Configure signing
        if: env.HAS_KEYSTORE == 'true'
        run: |
          cat >> android/app/build.gradle << 'GRADLE'

          android {
              signingConfigs {
                  release {
                      storeFile file('carsai.keystore')
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEYSTORE_ALIAS")
                      keyPassword System.getenv("KEYSTORE_PASSWORD")
                  }
              }
              buildTypes {
                  release { signingConfig signingConfigs.release }
              }
          }
          GRADLE
          echo "✅ Signing configured"

      - name: Build APK + AAB
        working-directory: android
        env:
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon
          echo "✅ Build complete"
          find app/build/outputs -name "*.apk" -o -name "*.aab" | xargs ls -lh

      - name: Set final version
        id: final
        run: |
          if   [ "${{ github.event_name }}" = "release" ]; then
            V="${{ github.ref_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            V="${{ inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            V="${{ github.ref_name }}"
          else
            V="${{ steps.versioning.outputs.version }}"
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "🏷️ Final version: $V"

      - name: Prepare artifacts
        id: artifacts
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n1)
          AAB=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -n1)
          V="${{ steps.final.outputs.version }}"
          ANAME="carsai-yt-studio-${V}.apk"
          BNAME="carsai-yt-studio-${V}.aab"
          cp "$APK" "$ANAME"
          cp "$AAB" "$BNAME"
          echo "apk=$ANAME" >> $GITHUB_OUTPUT
          echo "aab=$BNAME" >> $GITHUB_OUTPUT
          echo "📦 APK: $(ls -lh $ANAME | awk '{print $5}')"
          echo "📦 AAB: $(ls -lh $BNAME | awk '{print $5}')"

      - name: Create tag (on push to main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          V="${{ steps.final.outputs.version }}"
          git tag -a "$V" -m "🚀 Build #${{ steps.versioning.outputs.build }}"
          git push origin "$V"
          echo "🏷️ Tag $V created"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.final.outputs.version }}
          path: ${{ steps.artifacts.outputs.apk }}
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ steps.final.outputs.version }}
          path: ${{ steps.artifacts.outputs.aab }}
          retention-days: 30

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.final.outputs.version }}
          name: "Carsai YT Studio ${{ steps.final.outputs.version }}"
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.apk }}
            ${{ steps.artifacts.outputs.aab }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
