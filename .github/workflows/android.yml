name: Android Build (APK + AAB)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  android:
    runs-on: ubuntu-latest
    permissions:
      contents: write # precisa pra criar release + commit changelog
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # pega histórico todo pro changelog

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Install Capacitor deps
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Add Android platform if missing
        run: |
          [ -d android ] || npx cap add android
          npx cap sync android

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64!= '' }}
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore/release.jks

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Build signed APK + AAB
        if: ${{ secrets.KEYSTORE_BASE64!= '' }}
        working-directory: android
        run: |
          chmod +x./gradlew
         ./gradlew assembleRelease bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/keystore/release.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            -PversionName="${VERSION:-1.0.0}"

      - name: Build unsigned APK + AAB (no keystore)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        working-directory: android
        run: |
          chmod +x./gradlew
         ./gradlew assembleRelease bundleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Generate CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PREV_TAG=$(git describe --abbrev=0 --tags HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s (%h)" > CHANGELOG.md
          else
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" > CHANGELOG.md
          fi
          echo "" >> CHANGELOG.md
          echo "### Versão $VERSION" | cat - CHANGELOG.md > temp && mv temp CHANGELOG.md

      - name: Commit CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG.md for $VERSION" || echo "No changes"
          git push origin HEAD:main || true

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab