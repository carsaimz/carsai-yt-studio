name: Android — APK + AAB

on:
  push:
    branches: [main]
    tags: ['v*']
  release:
    types: [published, created]
  workflow_dispatch:
    inputs:
      version:
        description: "Versão do app (ex: 1.2.0). Vazio = usa package.json"
        required: false
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Resolve version
        id: ver
        run: |
          # Priority: manual input > tag > package.json
          if [ -n "${{ inputs.version }}" ]; then
            BASE="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            BASE="${{ github.ref_name }}"
            BASE="${BASE#v}"
          else
            BASE=$(node -p "require('./package.json').version")
          fi

          # Calculate build number from tags
          LAST=$(git tag -l "v${BASE}*" --sort=-v:refname | head -n1)
          if [ -z "$LAST" ]; then BUILD=1
          elif [[ "$LAST" =~ build\.([0-9]+)$ ]]; then BUILD=$(( ${BASH_REMATCH[1]} + 1 ))
          else BUILD=1; fi

          TAG="v${BASE}-build.${BUILD}"
          echo "base=$BASE"   >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "tag=$TAG"     >> $GITHUB_OUTPUT
          echo "📦 Version: $BASE | Build: $BUILD | Tag: $TAG"

      - name: Update version in package.json and capacitor.config.json
        run: |
          BASE="${{ steps.ver.outputs.base }}"
          BUILD="${{ steps.ver.outputs.build }}"

          # package.json
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json'));
            p.version = '$BASE';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
          "

          # capacitor.config.json
          node -e "
            const fs = require('fs');
            const c = JSON.parse(fs.readFileSync('capacitor.config.json'));
            c.appVersion = '$BASE';
            c.appVersionCode = $BUILD;
            fs.writeFileSync('capacitor.config.json', JSON.stringify(c, null, 2));
          "
          echo "✅ package.json → $BASE | capacitor.config.json → $BASE (code $BUILD)"

      - name: Build web (mobile)
        run: node scripts/build-web.mjs
        env:
          BUILD_TARGET: mobile
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Install Capacitor
        run: |
          npm install \
            @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets \
            @capacitor/push-notifications @capacitor/splash-screen \
            @capacitor/status-bar @capacitor/camera @capacitor/filesystem \
            @capacitor/preferences @capacitor/network @capacitor/device

      - name: Setup Capacitor Android
        run: |
          if [ -d "android" ] && [ ! -f "android/app/src/main/AndroidManifest.xml" ]; then
            rm -rf android
          fi
          [ -d android ] || npx cap add android
          npx cap sync android

      - name: Generate icons + splash via @capacitor/assets
        run: |
          mkdir -p resources
          cp public/icon-512.png resources/icon.png
          cp public/icon-512.png resources/icon-foreground.png
          convert public/icon-512.png -background "#1a1410" -gravity center \
            -extent 512x512 resources/icon-background.png 2>/dev/null \
            || cp public/icon-512.png resources/icon-background.png
          convert public/icon-512.png -background "#1a1410" -gravity center \
            -extent 2732x2732 resources/splash.png 2>/dev/null \
            || cp public/icon-512.png resources/splash.png

          npx @capacitor/assets generate --android \
            --iconBackgroundColor "#1a1410" \
            --iconBackgroundColorDark "#1a1410" \
            --splashBackgroundColor "#1a1410" \
            --splashBackgroundColorDark "#1a1410" \
            || echo "⚠️ assets partial — continuing"

      - name: Patch AndroidManifest + version
        run: |
          BASE="${{ steps.ver.outputs.base }}"
          BUILD="${{ steps.ver.outputs.build }}"

          # Update build.gradle version
          sed -i "s/versionCode [0-9]*/versionCode ${BUILD}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${BASE}\"/" android/app/build.gradle
          echo "✅ build.gradle: versionCode=$BUILD versionName=$BASE"

          # Patch permissions
          python3 << 'PY'
          import re
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path) as f:
              content = f.read()
          content = re.sub(r'\s*<uses-permission[^/]*/>', '', content)
          perms = """
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>"""
          content = re.sub(r'(<manifest[^>]*>)', r'\1' + perms, content, count=1)
          with open(path, 'w') as f:
              f.write(content)
          print("✅ Permissions patched")
          PY

      - name: Setup keystore
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: |
          if [ -n "$KEYSTORE_FILE" ]; then
            printf '%s' "$KEYSTORE_FILE" | tr -d '[:space:]' | base64 -d > android/app/carsai.keystore
            keytool -list -keystore android/app/carsai.keystore \
              -storepass "carsaidev" -alias "carsaidev" -noprompt \
              && echo "HAS_KEYSTORE=true" >> $GITHUB_ENV \
              || { echo "⚠️ Keystore inválido"; echo "HAS_KEYSTORE=false" >> $GITHUB_ENV; }
          else
            echo "HAS_KEYSTORE=false" >> $GITHUB_ENV
            echo "⚠️ Sem keystore — build não assinada"
          fi

      - name: Configure signing
        if: env.HAS_KEYSTORE == 'true'
        run: |
          cat >> android/app/build.gradle << 'GRADLE'

          android {
              signingConfigs {
                  release {
                      storeFile file('carsai.keystore')
                      storePassword "carsaidev"
                      keyAlias "carsaidev"
                      keyPassword "carsaidev"
                  }
              }
              buildTypes {
                  release { signingConfig signingConfigs.release }
              }
          }
          GRADLE

      - name: Build APK + AAB
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon
          find app/build/outputs -name "*.apk" -o -name "*.aab" | xargs ls -lh

      - name: Prepare artifacts
        id: artifacts
        run: |
          V="${{ steps.ver.outputs.tag }}"
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n1)
          AAB=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -n1)
          ANAME="carsai-yt-studio-${V}.apk"
          BNAME="carsai-yt-studio-${V}.aab"
          cp "$APK" "$ANAME"
          cp "$AAB" "$BNAME"
          echo "apk=$ANAME"  >> $GITHUB_OUTPUT
          echo "aab=$BNAME"  >> $GITHUB_OUTPUT
          echo "tag=${V}"    >> $GITHUB_OUTPUT

      - name: Commit version bump + create tag
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          git add package.json capacitor.config.json
          git commit -m "chore: bump version to ${{ steps.ver.outputs.base }} (build ${{ steps.ver.outputs.build }}) [skip ci]" || true
          git tag -a "$TAG" -m "🚀 Android build ${{ steps.ver.outputs.build }} — v${{ steps.ver.outputs.base }}"
          git push origin HEAD:main "$TAG" || git push origin "$TAG" || true

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.ver.outputs.tag }}
          path: ${{ steps.artifacts.outputs.apk }}
          retention-days: 30

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ steps.ver.outputs.tag }}
          path: ${{ steps.artifacts.outputs.aab }}
          retention-days: 30

      - name: Attach APK + AAB to existing release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.base }}
          files: |
            ${{ steps.artifacts.outputs.apk }}
            ${{ steps.artifacts.outputs.aab }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
