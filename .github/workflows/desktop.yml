name: Desktop — Tauri (Win + Mac + Linux)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  tauri:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: ''
          - os: macos-latest
            args: '--target universal-apple-darwin'
          - os: windows-latest
            args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install --save-dev @tauri-apps/cli@^2

      - name: Build web (mobile static for Tauri)
        run: npm run build:mobile
        env:
          BUILD_TARGET: mobile
          NITRO_PRESET: node-server

      - name: Init Tauri project (if src-tauri missing)
        shell: bash
        run: |
          if [ ! -d "src-tauri" ]; then
            npx tauri init \
              --app-name "Carsai YT Studio" \
              --window-title "Carsai YT Studio" \
              --dist-dir "../dist/client" \
              --dev-url "http://localhost:3000" \
              --before-dev-command "" \
              --before-build-command "" \
              --ci
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Carsai YT Studio ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          tauriScript: npx tauri
          args: ${{ matrix.args }}
