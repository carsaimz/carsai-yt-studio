name: Desktop — Tauri (Win + Mac + Linux)

on:
  push:
    tags: ['v*']
  release:
    types: [published, created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tauri:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: ''
          - os: macos-latest
            args: '--target universal-apple-darwin'
          - os: windows-latest
            args: '--bundles nsis,msi'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build:mobile
        env:
          BUILD_TARGET: mobile
          NITRO_PRESET: node-server
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Ensure src-tauri exists
        shell: bash
        run: |
          if [ ! -d "src-tauri" ]; then
            mkdir -p src-tauri/icons src-tauri/src
            cp public/tauri-icons/32x32.png     src-tauri/icons/32x32.png
            cp public/tauri-icons/128x128.png   src-tauri/icons/128x128.png
            cp public/tauri-icons/128x128@2x.png src-tauri/icons/128x128@2x.png
            cp public/tauri-icons/icon.ico      src-tauri/icons/icon.ico
            cp public/tauri-icons/icon.png      src-tauri/icons/icon.png

            cat > src-tauri/Cargo.toml << 'CARGO'
          [package]
          name = "carsai-yt-studio"
          version = "0.1.0"
          edition = "2021"
          rust-version = "1.77.2"
          [build-dependencies]
          tauri-build = { version = "2", features = [] }
          [dependencies]
          tauri = { version = "2", features = [] }
          tauri-plugin-opener = "2"
          serde = { version = "1", features = ["derive"] }
          serde_json = "1"
          CARGO

            cat > src-tauri/build.rs << 'BUILDRS'
          fn main() { tauri_build::build() }
          BUILDRS

            cat > src-tauri/src/main.rs << 'MAINRS'
          #![cfg_attr(not(debug_assertions), windows_subsystem = "windows")]
          fn main() { carsai_yt_studio::run() }
          MAINRS

            cat > src-tauri/src/lib.rs << 'LIBRS'
          #[cfg_attr(mobile, tauri::mobile_entry_point)]
          pub fn run() {
              tauri::Builder::default()
                  .plugin(tauri_plugin_opener::init())
                  .run(tauri::generate_context!())
                  .expect("error while running tauri application");
          }
          LIBRS

            cat > src-tauri/tauri.conf.json << 'TAURICONF'
          {
            "$schema": "https://schema.tauri.app/config/2",
            "productName": "Carsai YT Studio",
            "version": "0.1.0",
            "identifier": "com.carsai.ytstudio",
            "build": {
              "frontendDist": "../dist/client",
              "devUrl": "http://localhost:3000",
              "beforeDevCommand": "",
              "beforeBuildCommand": ""
            },
            "app": {
              "windows": [
                {
                  "title": "Carsai YT Studio",
                  "width": 1280,
                  "height": 800,
                  "minWidth": 960,
                  "minHeight": 600
                }
              ],
              "security": { "csp": null }
            },
            "bundle": {
              "active": true,
              "targets": "all",
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.ico",
                "icons/icon.png"
              ],
              "windows": {
                "certificateThumbprint": null,
                "digestAlgorithm": "sha256",
                "timestampUrl": ""
              }
            }
          }
          TAURICONF
          else
            cp public/tauri-icons/*.png src-tauri/icons/ 2>/dev/null || true
            cp public/tauri-icons/icon.ico src-tauri/icons/ 2>/dev/null || true
          fi

      - name: Get current version
        id: ver
        run: echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.ver.outputs.tag }}
          releaseName: Carsai YT Studio ${{ steps.ver.outputs.tag }}
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
          args: ${{ matrix.args }}
