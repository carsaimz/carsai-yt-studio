name: Desktop — Tauri (Win + Mac + Linux)

# Item 6 + 7: este workflow não muta versão no repo. Descobre o último tag e
# anexa os bundles a esse tag. Em Windows, além do upload do tauri-action,
# anexamos explicitamente os .msi/.exe encontrados em src-tauri/target —
# isso resolve o bug em que os assets de Windows não apareciam no release.

on:
  push:
    tags: ['v*']
  release:
    types: [published, created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tauri:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: ''
          - os: macos-latest
            args: '--target universal-apple-darwin'
          - os: windows-latest
            args: '--bundles nsis,msi'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: npm install

      - name: Resolve latest tag
        id: ver
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG=$(git tag --sort=-v:refname | grep "^v" | head -n1)
          fi
          [ -z "$TAG" ] && TAG="v$(node -p "require('./package.json').version")"
          echo "tag=$TAG"        >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "📦 Tag alvo: $TAG"

      - name: Apply version to build files (no commit)
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='$V';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          node scripts/sync-version.mjs || true

      - name: Build web
        run: npm run build:mobile
        env:
          BUILD_TARGET: mobile
          NITRO_PRESET: node-server
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Ensure src-tauri exists
        shell: bash
        run: |
          if [ ! -d "src-tauri" ]; then
            mkdir -p src-tauri/icons src-tauri/src
            cp public/tauri-icons/32x32.png     src-tauri/icons/32x32.png
            cp public/tauri-icons/128x128.png   src-tauri/icons/128x128.png
            cp public/tauri-icons/128x128@2x.png src-tauri/icons/128x128@2x.png
            cp public/tauri-icons/icon.ico      src-tauri/icons/icon.ico
            cp public/tauri-icons/icon.png      src-tauri/icons/icon.png

            cat > src-tauri/Cargo.toml << 'CARGO'
          [package]
          name = "carsai-yt-studio"
          version = "0.1.0"
          edition = "2021"
          rust-version = "1.77.2"
          [build-dependencies]
          tauri-build = { version = "2", features = [] }
          [dependencies]
          tauri = { version = "2", features = [] }
          tauri-plugin-opener = "2"
          serde = { version = "1", features = ["derive"] }
          serde_json = "1"
          CARGO

            cat > src-tauri/build.rs << 'BUILDRS'
          fn main() { tauri_build::build() }
          BUILDRS

            cat > src-tauri/src/main.rs << 'MAINRS'
          #![cfg_attr(not(debug_assertions), windows_subsystem = "windows")]
          fn main() { carsai_yt_studio::run() }
          MAINRS

            cat > src-tauri/src/lib.rs << 'LIBRS'
          #[cfg_attr(mobile, tauri::mobile_entry_point)]
          pub fn run() {
              tauri::Builder::default()
                  .plugin(tauri_plugin_opener::init())
                  .run(tauri::generate_context!())
                  .expect("error while running tauri application");
          }
          LIBRS

            cat > src-tauri/tauri.conf.json << 'TAURICONF'
          {
            "$schema": "https://schema.tauri.app/config/2",
            "productName": "Carsai YT Studio",
            "version": "0.1.0",
            "identifier": "com.carsai.ytstudio",
            "build": {
              "frontendDist": "../dist/client",
              "devUrl": "http://localhost:3000",
              "beforeDevCommand": "",
              "beforeBuildCommand": ""
            },
            "app": {
              "windows": [
                {
                  "title": "Carsai YT Studio",
                  "width": 1280,
                  "height": 800,
                  "minWidth": 960,
                  "minHeight": 600
                }
              ],
              "security": { "csp": null }
            },
            "bundle": {
              "active": true,
              "targets": "all",
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.ico",
                "icons/icon.png"
              ],
              "windows": {
                "certificateThumbprint": null,
                "digestAlgorithm": "sha256",
                "timestampUrl": ""
              }
            }
          }
          TAURICONF
          else
            cp public/tauri-icons/*.png src-tauri/icons/ 2>/dev/null || true
            cp public/tauri-icons/icon.ico src-tauri/icons/ 2>/dev/null || true
          fi

      - name: Sync version into Tauri config + Cargo.toml
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p));c.version='$V';fs.writeFileSync(p,JSON.stringify(c,null,2));"
          # Cargo.toml version line (first occurrence only — root [package])
          python3 - << PY
          import re, pathlib
          path = pathlib.Path("src-tauri/Cargo.toml")
          src = path.read_text()
          src = re.sub(r'(?m)^version\s*=\s*"[^"]+"', f'version = "$V"', src, count=1)
          path.write_text(src)
          PY

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.ver.outputs.tag }}
          releaseName: Carsai YT Studio ${{ steps.ver.outputs.tag }}
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
          args: ${{ matrix.args }}

      # Item 7 — fallback explícito para garantir que assets de Windows ficam
      # anexados ao release mesmo quando o tauri-action não os envia.
      - name: Collect Windows bundles
        if: matrix.os == 'windows-latest'
        id: winbundles
        shell: bash
        run: |
          mkdir -p win-out
          find src-tauri/target -type f \( -name "*.msi" -o -name "*.exe" \) \
            -path "*/release/bundle/*" -print0 \
            | xargs -0 -I{} cp "{}" win-out/ 2>/dev/null || true
          ls -la win-out || true
          COUNT=$(ls win-out 2>/dev/null | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest' && steps.winbundles.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: win-out/*
          retention-days: 30

      - name: Attach Windows installers to release
        if: matrix.os == 'windows-latest' && steps.winbundles.outputs.count != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: win-out/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
