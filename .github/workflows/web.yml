name: Web — Build

# Item 6: build não cria nem altera versão. Em workflow_dispatch o build
# descobre o último tag e (opcionalmente) anexa um zip da build estática a
# esse tag. Para criar uma versão nova use o workflow "Version Sync / Bump"
# ou "Release — Changelog + Tag".

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve latest tag
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG=$(git tag --sort=-v:refname | grep '^v' | head -n1)
          fi
          [ -z "$TAG" ] && TAG="v$(node -p "require('./package.json').version")"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "📦 Tag alvo para anexação: $TAG"

      - name: Sync version into build (without committing)
        run: |
          V="${{ steps.ver.outputs.tag }}"
          V="${V#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='$V';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          node scripts/sync-version.mjs || true

      - name: Install dependencies
        run: npm install

      - name: Build
        run: node scripts/build-web.mjs
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Package zip
        id: pkg
        run: |
          V="${{ steps.ver.outputs.tag }}"
          ZIP="carsai-yt-studio-web-${V}.zip"
          (cd .output/public && zip -qr "../../$ZIP" .)
          echo "zip=$ZIP" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: .output/public
          if-no-files-found: warn
          retention-days: 7

      - name: Attach web zip to release
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: ${{ steps.pkg.outputs.zip }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
