name: Web — Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Versão (ex: 1.0.0) — para criar release"
        required: false
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build Web
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V=$(node -p "require('./package.json').version")
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "📦 Version: $V"

      - name: Update version in package.json if changed
        run: |
          V="${{ steps.ver.outputs.version }}"
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$V" != "$CURRENT" ]; then
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('package.json'));
              p.version = '$V';
              fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
            "
            git add package.json
            git commit -m "chore: bump version to $V [skip ci]" || true
            git push || true
          fi

      - name: Build
        run: node scripts/build-web.mjs
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ steps.ver.outputs.version }}
          path: .output/public
          if-no-files-found: error
          retention-days: 7

  trigger-others:
    name: Trigger Android + Desktop
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Android
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/android.yml/dispatches" \
            -d '{"ref":"main"}' && echo "✅ Android triggered" || echo "⚠️ Android trigger failed (non-fatal)"

      - name: Trigger Desktop
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/desktop.yml/dispatches" \
            -d '{"ref":"main"}' && echo "✅ Desktop triggered" || echo "⚠️ Desktop trigger failed (non-fatal)"
